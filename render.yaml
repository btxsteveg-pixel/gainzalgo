services:
  - type: web
    name: gainzalgo-monster
    runtime: python
    plan: starter
    autoDeploy: true
    disk:
      name: gainzalgo-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TV_WEBHOOK_HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data/gainzalgo
      - key: TUNNEL_PROVIDER
        value: render
